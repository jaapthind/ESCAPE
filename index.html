<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block D - The Escape</title>
<style>
    body { margin: 0; overflow: hidden; background: #000; font-family: monospace; user-select: none; }
    #game-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
    #ui-layer { position: absolute; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
    #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.8); transform: translate(-50%, -50%); border-radius: 50%; }
    #hud { position: absolute; bottom: 20px; left: 20px; color: #fff; text-shadow: 1px 1px 2px #000; font-size: 14px; }
    #inventory-display { position: absolute; top: 20px; right: 20px; color: #aaa; text-align: right; }
    #subtitles { position: absolute; bottom: 10vh; width: 100%; text-align: center; color: #e0e0e0; font-size: 18px; font-weight: bold; text-shadow: 0 0 5px #000; opacity: 0; transition: opacity 0.3s; }
    #blocker { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; cursor: pointer; }
    .title { font-size: 48px; color: #555; text-transform: uppercase; letter-spacing: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .instructions { font-size: 16px; color: #888; text-align: center; line-height: 1.5; }
    .fade-overlay { position: absolute; width: 100%; height: 100%; background: #000; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 2s; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

<div id="blocker">
    <div class="title">BLOCK D</div>
    <div class="instructions">
        CLICK TO COMMENCE<br><br>
        W A S D - MOVEMENT<br>
        MOUSE - LOOK<br>
        E - INTERACT<br>
        SPACE - VAULT/JUMP<br>
        C - CROUCH<br>
    </div>
</div>

<div id="ui-layer">
    <div id="crosshair"></div>
    <div id="hud">STATE: CONFINED<br>PHASE 1: PREPARATION</div>
    <div id="inventory-display">INVENTORY<br>---------<br><span id="inv-items">EMPTY</span></div>
    <div id="subtitles"></div>
</div>
<div id="fade-overlay" class="fade-overlay"></div>
<div id="game-container"></div>

<script>
const GameMasterState = {
    phase: 1, // 1: Prep, 2: Distract, 3: Act, 4: Nav
    timeOfDay: 0.0, // 0 to 24
    daySpeed: 0.001,
    weather: 'rain',
    guardAlertLevel: 0, // 0: Patrol, 1: Suspicious, 2: Alert, 3: Pursuit
    playerDetected: false,
    ventOpen: false,
    cellDoorOpen: false,
    distractionActive: false,
    distractionLocation: new THREE.Vector3(0,0,0)
};

const ComplexInventoryDataSystem = {
    items: [],
    slots: 5,
    selectedSlot: 0,
    equipped: null,
    addItem: function(itemObject) {
        if (this.items.length < this.slots) {
            this.items.push(itemObject);
            this.updateUI();
            return true;
        }
        return false;
    },
    hasItem: function(itemId) {
        for (let i = 0; i < this.items.length; i++) {
            if (this.items[i].id === itemId) return true;
        }
        return false;
    },
    updateUI: function() {
        const el = document.getElementById('inv-items');
        if (this.items.length === 0) { el.innerHTML = 'EMPTY'; return; }
        let html = '';
        for (let i = 0; i < this.items.length; i++) {
            html += this.items[i].displayName + ' [HP: ' + this.items[i].condition + ']<br>';
        }
        el.innerHTML = html;
    }
};

const PhysicalCollisionWorldBoundingBoxes = [];

const RendererSetupParameters = {
    antialias: false,
    powerPreference: "high-performance",
    logarithmicDepthBuffer: true
};

const SceneConfigurationObject = {
    fogColorNight: 0x050508,
    fogColorDay: 0x22252a,
    fogDensityNight: 0.04,
    fogDensityDay: 0.015,
    ambientNight: 0x0a0a0f,
    ambientDay: 0x334455
};

const container = document.getElementById('game-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(SceneConfigurationObject.fogColorNight);
scene.fog = new THREE.FogExp2(SceneConfigurationObject.fogColorNight, SceneConfigurationObject.fogDensityNight);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer(RendererSetupParameters);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
container.appendChild(renderer.domElement);

const CameraEulerRotationSystem = new THREE.Euler(0, 0, 0, 'YXZ');
const HalfPiConstantValue = Math.PI / 2;
let ControllerPointerIsLocked = false;
let PlayerMovementStateForward = false;
let PlayerMovementStateBackward = false;
let PlayerMovementStateLeft = false;
let PlayerMovementStateRight = false;
let PlayerMovementStateCrouch = false;
let PlayerMovementStateJump = false;

const PlayerPhysicalProperties = {
    velocity: new THREE.Vector3(0, 0, 0),
    direction: new THREE.Vector3(0, 0, 0),
    speed: 35.0,
    crouchSpeed: 15.0,
    mass: 85.0,
    heightStanding: 1.75,
    heightCrouching: 0.9,
    currentHeight: 1.75,
    jumpForce: 15.0,
    isGrounded: false,
    radius: 0.3
};
camera.position.set(0, PlayerPhysicalProperties.currentHeight, 0);

document.getElementById('blocker').addEventListener('click', function () {
    document.body.requestPointerLock();
});

document.addEventListener('pointerlockchange', function () {
    if (document.pointerLockElement === document.body) {
        ControllerPointerIsLocked = true;
        document.getElementById('blocker').style.display = 'none';
    } else {
        ControllerPointerIsLocked = false;
        document.getElementById('blocker').style.display = 'flex';
        PlayerMovementStateForward = false;
        PlayerMovementStateBackward = false;
        PlayerMovementStateLeft = false;
        PlayerMovementStateRight = false;
    }
});

document.addEventListener('mousemove', function (event) {
    if (ControllerPointerIsLocked === false) return;
    const movementXData = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
    const movementYData = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
    CameraEulerRotationSystem.setFromQuaternion(camera.quaternion);
    CameraEulerRotationSystem.y -= movementXData * 0.002;
    CameraEulerRotationSystem.x -= movementYData * 0.002;
    CameraEulerRotationSystem.x = Math.max(-HalfPiConstantValue, Math.min(HalfPiConstantValue, CameraEulerRotationSystem.x));
    camera.quaternion.setFromEuler(CameraEulerRotationSystem);
});

document.addEventListener('keydown', function (event) {
    if (!ControllerPointerIsLocked) return;
    switch (event.code) {
        case 'ArrowUp':
        case 'KeyW': PlayerMovementStateForward = true; break;
        case 'ArrowLeft':
        case 'KeyA': PlayerMovementStateLeft = true; break;
        case 'ArrowDown':
        case 'KeyS': PlayerMovementStateBackward = true; break;
        case 'ArrowRight':
        case 'KeyD': PlayerMovementStateRight = true; break;
        case 'KeyC': PlayerMovementStateCrouch = true; break;
        case 'Space': 
            if (PlayerPhysicalProperties.isGrounded) {
                PlayerPhysicalProperties.velocity.y = PlayerPhysicalProperties.jumpForce;
                PlayerPhysicalProperties.isGrounded = false;
            }
            break;
        case 'KeyE': ExecutePrimaryInteractionRaycast(); break;
    }
});

document.addEventListener('keyup', function (event) {
    if (!ControllerPointerIsLocked) return;
    switch (event.code) {
        case 'ArrowUp':
        case 'KeyW': PlayerMovementStateForward = false; break;
        case 'ArrowLeft':
        case 'KeyA': PlayerMovementStateLeft = false; break;
        case 'ArrowDown':
        case 'KeyS': PlayerMovementStateBackward = false; break;
        case 'ArrowRight':
        case 'KeyD': PlayerMovementStateRight = false; break;
        case 'KeyC': PlayerMovementStateCrouch = false; break;
    }
});

const CustomProceduralGrimeMaterialShader = {
    uniforms: {
        time: { value: 0.0 },
        baseColor: { value: new THREE.Color(0x1a1a1a) },
        noiseScale: { value: 15.0 }
    },
    vertexShader: `
        varying vec2 vUv;
        varying vec3 vPosition;
        varying vec3 vNormal;
        void main() {
            vUv = uv;
            vPosition = (modelMatrix * vec4(position, 1.0)).xyz;
            vNormal = normalMatrix * normal;
            gl_Position = projectionMatrix * viewMatrix * vec4(vPosition, 1.0);
        }
    `,
    fragmentShader: `
        uniform float time;
        uniform vec3 baseColor;
        uniform float noiseScale;
        varying vec2 vUv;
        varying vec3 vPosition;
        varying vec3 vNormal;

        float hash(vec2 p) { return fract(1e4 * sin(17.0 * p.x + p.y * 0.1) * (0.1 + abs(sin(p.y * 13.0 + p.x)))); }
        float noise(vec2 x) {
            vec2 i = floor(x);
            vec2 f = fract(x);
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
        }

        void main() {
            float n = noise(vPosition.xz * noiseScale) * 0.5 + noise(vPosition.xy * noiseScale * 2.0) * 0.25;
            vec3 finalColor = mix(baseColor, vec3(0.05, 0.05, 0.05), n);
            float light = dot(normalize(vNormal), vec3(0.0, 1.0, 0.0)) * 0.5 + 0.5;
            
            // Artificial ambient occlusion simulation
            float ao = smoothstep(0.0, 0.5, vPosition.y);
            finalColor *= (light * 0.5 + 0.5) * ao;

            gl_FragColor = vec4(finalColor, 1.0);
        }
    `
};

const CustomRustySteelMaterialShader = {
    uniforms: {
        time: { value: 0.0 },
    },
    vertexShader: `
        varying vec2 vUv;
        varying vec3 vPos;
        void main() {
            vUv = uv;
            vPos = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        varying vec3 vPos;
        float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
        void main() {
            float rust = rand(floor(vUv * 100.0)) * rand(floor(vUv * 20.0));
            vec3 color = mix(vec3(0.1, 0.1, 0.1), vec3(0.4, 0.15, 0.05), step(0.6, rust));
            // Simulate grating gaps
            float gratingX = mod(vPos.x * 20.0, 1.0);
            float gratingZ = mod(vPos.z * 20.0, 1.0);
            if (gratingX < 0.1 || gratingZ < 0.1) discard;
            gl_FragColor = vec4(color, 1.0);
        }
    `
};

const WallMaterialInstance = new THREE.ShaderMaterial({
    uniforms: THREE.UniformsUtils.clone(CustomProceduralGrimeMaterialShader.uniforms),
    vertexShader: CustomProceduralGrimeMaterialShader.vertexShader,
    fragmentShader: CustomProceduralGrimeMaterialShader.fragmentShader
});

const SteelGratingMaterialInstance = new THREE.ShaderMaterial({
    uniforms: THREE.UniformsUtils.clone(CustomRustySteelMaterialShader.uniforms),
    vertexShader: CustomRustySteelMaterialShader.vertexShader,
    fragmentShader: CustomRustySteelMaterialShader.fragmentShader,
    side: THREE.DoubleSide
});

const AmbientLightSystem = new THREE.AmbientLight(SceneConfigurationObject.ambientNight);
scene.add(AmbientLightSystem);

const MoonDirectionalLightSystem = new THREE.DirectionalLight(0x8899aa, 0.5);
MoonDirectionalLightSystem.position.set(50, 100, 50);
MoonDirectionalLightSystem.castShadow = true;
MoonDirectionalLightSystem.shadow.camera.left = -50;
MoonDirectionalLightSystem.shadow.camera.right = 50;
MoonDirectionalLightSystem.shadow.camera.top = 50;
MoonDirectionalLightSystem.shadow.camera.bottom = -50;
MoonDirectionalLightSystem.shadow.bias = -0.001;
scene.add(MoonDirectionalLightSystem);

const MainCourtyardSpotlight = new THREE.SpotLight(0xffddaa, 2.0);
MainCourtyardSpotlight.position.set(0, 20, 0);
MainCourtyardSpotlight.angle = Math.PI / 4;
MainCourtyardSpotlight.penumbra = 0.5;
MainCourtyardSpotlight.decay = 2;
MainCourtyardSpotlight.distance = 50;
MainCourtyardSpotlight.castShadow = true;
scene.add(MainCourtyardSpotlight);

const EnvironmentMeshGroups = {
    walls: new THREE.Group(),
    floors: new THREE.Group(),
    doors: new THREE.Group(),
    details: new THREE.Group()
};
scene.add(EnvironmentMeshGroups.walls);
scene.add(EnvironmentMeshGroups.floors);
scene.add(EnvironmentMeshGroups.doors);
scene.add(EnvironmentMeshGroups.details);

function GenerateBoxGeometryWithExplicitVerticesAndIndices(width, height, depth) {
    const geo = new THREE.BufferGeometry();
    const hw = width / 2; const hh = height / 2; const hd = depth / 2;
    const vertices = new Float32Array([
        hw, hh, hd,  hw, -hh, hd,  hw, hh, -hd,  hw, -hh, -hd,
        -hw, hh, hd, -hw, -hh, hd, -hw, hh, -hd, -hw, -hh, -hd,
        hw, hh, hd, -hw, hh, hd,  hw, hh, -hd, -hw, hh, -hd,
        hw, -hh, hd, -hw, -hh, hd, hw, -hh, -hd, -hw, -hh, -hd,
        hw, hh, hd, -hw, hh, hd,  hw, -hh, hd, -hw, -hh, hd,
        hw, hh, -hd, -hw, hh, -hd, hw, -hh, -hd, -hw, -hh, -hd
    ]);
    const indices = [
        0,2,1, 2,3,1, 4,6,5, 6,7,5, 8,9,10, 9,11,10, 
        12,14,13, 14,15,13, 16,18,17, 18,19,17, 20,21,22, 21,23,22
    ];
    geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();
    return geo;
}

function RegisterBoundingBoxForCollisionWorld(x, y, z, w, h, d) {
    PhysicalCollisionWorldBoundingBoxes.push({
        minX: x - w/2, maxX: x + w/2,
        minY: y - h/2, maxY: y + h/2,
        minZ: z - d/2, maxZ: z + d/2
    });
}

const CourtyardFloorGeometry = GenerateBoxGeometryWithExplicitVerticesAndIndices(60, 1, 40);
const CourtyardFloorMesh = new THREE.Mesh(CourtyardFloorGeometry, WallMaterialInstance);
CourtyardFloorMesh.position.set(0, -0.5, 0);
CourtyardFloorMesh.receiveShadow = true;
EnvironmentMeshGroups.floors.add(CourtyardFloorMesh);
RegisterBoundingBoxForCollisionWorld(0, -0.5, 0, 60, 1, 40);

const CatwalkGeometryLevel1 = GenerateBoxGeometryWithExplicitVerticesAndIndices(50, 0.2, 4);
const CatwalkMeshLevel1 = new THREE.Mesh(CatwalkGeometryLevel1, SteelGratingMaterialInstance);
CatwalkMeshLevel1.position.set(0, 4, -15);
CatwalkMeshLevel1.receiveShadow = true;
CatwalkMeshLevel1.castShadow = true;
EnvironmentMeshGroups.floors.add(CatwalkMeshLevel1);
RegisterBoundingBoxForCollisionWorld(0, 4, -15, 50, 0.2, 4);

function ConstructPrisonCellUnit(cellXOffset, cellZOffset, cellLevelHeight, isPlayerCell) {
    const cellSize = 4;
    const cellHeight = 3.5;
    const cellWallThickness = 0.5;

    const backWallGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(cellSize, cellHeight, cellWallThickness);
    const backWall = new THREE.Mesh(backWallGeom, WallMaterialInstance);
    backWall.position.set(cellXOffset, cellLevelHeight + cellHeight/2, cellZOffset - cellSize/2 - cellWallThickness/2);
    EnvironmentMeshGroups.walls.add(backWall);
    RegisterBoundingBoxForCollisionWorld(backWall.position.x, backWall.position.y, backWall.position.z, cellSize, cellHeight, cellWallThickness);

    const leftWallGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(cellWallThickness, cellHeight, cellSize);
    const leftWall = new THREE.Mesh(leftWallGeom, WallMaterialInstance);
    leftWall.position.set(cellXOffset - cellSize/2 - cellWallThickness/2, cellLevelHeight + cellHeight/2, cellZOffset);
    EnvironmentMeshGroups.walls.add(leftWall);
    RegisterBoundingBoxForCollisionWorld(leftWall.position.x, leftWall.position.y, leftWall.position.z, cellWallThickness, cellHeight, cellSize);

    const rightWallGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(cellWallThickness, cellHeight, cellSize);
    const rightWall = new THREE.Mesh(rightWallGeom, WallMaterialInstance);
    rightWall.position.set(cellXOffset + cellSize/2 + cellWallThickness/2, cellLevelHeight + cellHeight/2, cellZOffset);
    EnvironmentMeshGroups.walls.add(rightWall);
    RegisterBoundingBoxForCollisionWorld(rightWall.position.x, rightWall.position.y, rightWall.position.z, cellWallThickness, cellHeight, cellSize);

    const ceilingGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(cellSize + cellWallThickness*2, cellWallThickness, cellSize + cellWallThickness);
    const ceiling = new THREE.Mesh(ceilingGeom, WallMaterialInstance);
    ceiling.position.set(cellXOffset, cellLevelHeight + cellHeight + cellWallThickness/2, cellZOffset - cellWallThickness/2);
    EnvironmentMeshGroups.walls.add(ceiling);
    RegisterBoundingBoxForCollisionWorld(ceiling.position.x, ceiling.position.y, ceiling.position.z, cellSize + cellWallThickness*2, cellWallThickness, cellSize + cellWallThickness);

    const doorFrameGroup = new THREE.Group();
    doorFrameGroup.position.set(cellXOffset, cellLevelHeight, cellZOffset + cellSize/2);
    
    for (let barIdx = 0; barIdx < 10; barIdx++) {
        const barGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(0.05, cellHeight, 0.05);
        const barMesh = new THREE.Mesh(barGeom, new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.8, roughness: 0.4}));
        barMesh.position.set(-cellSize/2 + 0.2 + barIdx * 0.4, cellHeight/2, 0);
        barMesh.castShadow = true;
        doorFrameGroup.add(barMesh);
        RegisterBoundingBoxForCollisionWorld(doorFrameGroup.position.x + barMesh.position.x, doorFrameGroup.position.y + barMesh.position.y, doorFrameGroup.position.z, 0.05, cellHeight, 0.05);
    }
    EnvironmentMeshGroups.walls.add(doorFrameGroup);

    if (isPlayerCell) {
        const bedGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(1.5, 0.5, 3.0);
        const bedMesh = new THREE.Mesh(bedGeom, new THREE.MeshStandardMaterial({color: 0x333333}));
        bedMesh.position.set(cellXOffset - cellSize/2 + 0.8, cellLevelHeight + 0.25, cellZOffset - cellSize/2 + 1.6);
        EnvironmentMeshGroups.details.add(bedMesh);
        RegisterBoundingBoxForCollisionWorld(bedMesh.position.x, bedMesh.position.y, bedMesh.position.z, 1.5, 0.5, 3.0);

        const looseBrickGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(0.4, 0.2, 0.2);
        const looseBrickMesh = new THREE.Mesh(looseBrickGeom, new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
        looseBrickMesh.position.set(cellXOffset, cellLevelHeight + 1.0, cellZOffset - cellSize/2 - cellWallThickness/2 + 0.1);
        looseBrickMesh.userData = { type: 'loose_brick', interacted: false };
        EnvironmentMeshGroups.details.add(looseBrickMesh);
        InteractableObjectsArray.push(looseBrickMesh);

        const ventGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(0.8, 0.8, 0.1);
        const ventMesh = new THREE.Mesh(ventGeom, new THREE.MeshStandardMaterial({color: 0x111111}));
        ventMesh.position.set(cellXOffset + cellSize/2 - 0.5, cellLevelHeight + cellHeight - 0.6, cellZOffset - cellSize/2 + 0.1);
        ventMesh.userData = { type: 'vent_cover', interacted: false };
        EnvironmentMeshGroups.details.add(ventMesh);
        InteractableObjectsArray.push(ventMesh);
        
        const spoonGeom = GenerateBoxGeometryWithExplicitVerticesAndIndices(0.05, 0.01, 0.2);
        const spoonMesh = new THREE.Mesh(spoonGeom, new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.9}));
        spoonMesh.position.set(cellXOffset - cellSize/2 + 0.8, cellLevelHeight + 0.52, cellZOffset - cellSize/2 + 2.8);
        spoonMesh.userData = { type: 'spoon', pickedUp: false };
        EnvironmentMeshGroups.details.add(spoonMesh);
        InteractableObjectsArray.push(spoonMesh);
    }
}

const InteractableObjectsArray = [];

ConstructPrisonCellUnit(0, -17, 4.2, true); 
ConstructPrisonCellUnit(-4.5, -17, 4.2, false); 
ConstructPrisonCellUnit(4.5, -17, 4.2, false); 

camera.position.set(0, 4.2 + PlayerPhysicalProperties.currentHeight, -17);

const DetailedCoordinateDataPaddingArray = new Float32Array(30000);
for(let dataIdx = 0; dataIdx < 30000; dataIdx+=3) {
    DetailedCoordinateDataPaddingArray[dataIdx] = (Math.random() - 0.5) * 100;
    DetailedCoordinateDataPaddingArray[dataIdx+1] = Math.random() * 20;
    DetailedCoordinateDataPaddingArray[dataIdx+2] = (Math.random() - 0.5) * 100;
}
const EnvironmentalDustGeometry = new THREE.BufferGeometry();
EnvironmentalDustGeometry.setAttribute('position', new THREE.BufferAttribute(DetailedCoordinateDataPaddingArray, 3));
const EnvironmentalDustMaterial = new THREE.PointsMaterial({color: 0x444444, size: 0.05, transparent: true, opacity: 0.4});
const EnvironmentalDustSystem = new THREE.Points(EnvironmentalDustGeometry, EnvironmentalDustMaterial);
scene.add(EnvironmentalDustSystem);

function AdvancedInteractionRaycastLogicSystem(objectData) {
    if (objectData.type === 'spoon' && !objectData.pickedUp) {
        objectData.pickedUp = true;
        objectData.meshRef.visible = false;
        ComplexInventoryDataSystem.addItem({ id: 'spoon', displayName: 'Rusted Spoon', condition: 100 });
        DisplaySubtitleTemporaryMessage("Acquired: Rusted Spoon. Might be useful for digging.");
        if (GameMasterState.phase === 1) {
            UpdateHUDStateText("PHASE 1: PREPARATION - FIND ESCAPE ROUTE");
        }
    }
    else if (objectData.type === 'loose_brick') {
        if (ComplexInventoryDataSystem.hasItem('spoon') && !objectData.interacted) {
            if (AIGuardPatrolSystem.currentLineOfSightHitPlayer) {
                DisplaySubtitleTemporaryMessage("Can't do this while the guard is watching!");
                return;
            }
            objectData.interacted = true;
            objectData.meshRef.position.z += 0.2;
            objectData.meshRef.rotation.y = Math.PI / 8;
            DisplaySubtitleTemporaryMessage("Pried the brick loose. There's a hidden cavity.");
            ComplexInventoryDataSystem.addItem({ id: 'lockpick', displayName: 'Makeshift Lockpick', condition: 50 });
            UpdateHUDStateText("PHASE 2: DISTRACTION");
            GameMasterState.phase = 2;
        } else if (!objectData.interacted) {
            DisplaySubtitleTemporaryMessage("A loose brick. I need something thin and sturdy to pry it.");
        }
    }
    else if (objectData.type === 'vent_cover') {
        if (GameMasterState.phase >= 3 && !objectData.interacted) {
            objectData.interacted = true;
            objectData.meshRef.rotation.x = Math.PI / 2;
            GameMasterState.ventOpen = true;
            UpdateHUDStateText("PHASE 4: NAVIGATION - ESCAPE THE MAZE");
            GameMasterState.phase = 4;
            DisplaySubtitleTemporaryMessage("Vent is open. Time to crawl.");
        } else if (!objectData.interacted) {
            DisplaySubtitleTemporaryMessage("Secured tightly. No way to open it from here right now.");
        }
    }
}

function ExecutePrimaryInteractionRaycast() {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(InteractableObjectsArray, false);
    
    if (intersects.length > 0 && intersects[0].distance < 2.5) {
        const hitObj = intersects[0].object;
        hitObj.userData.meshRef = hitObj;
        AdvancedInteractionRaycastLogicSystem(hitObj.userData);
    } else if (GameMasterState.phase === 2 && ComplexInventoryDataSystem.hasItem('spoon')) {
        const wallIntersects = raycaster.intersectObjects(EnvironmentMeshGroups.walls.children, false);
        if (wallIntersects.length > 0 && wallIntersects[0].distance < 2.0) {
            GameMasterState.distractionActive = true;
            GameMasterState.distractionLocation.copy(wallIntersects[0].point);
            DisplaySubtitleTemporaryMessage("Banged on the wall. That should get his attention.");
            GameMasterState.phase = 3;
            UpdateHUDStateText("PHASE 3: THE ACT - UNLOCK AND VENT");
        }
    }
}

let SubtitleTimeoutReference = null;
function DisplaySubtitleTemporaryMessage(msg) {
    const el = document.getElementById('subtitles');
    el.innerText = msg;
    el.style.opacity = 1.0;
    if (SubtitleTimeoutReference) clearTimeout(SubtitleTimeoutReference);
    SubtitleTimeoutReference = setTimeout(() => { el.style.opacity = 0.0; }, 4000);
}

function UpdateHUDStateText(phaseText) {
    document.getElementById('hud').innerHTML = `STATE: ${GameMasterState.playerDetected ? '<span style="color:red">DETECTED</span>' : 'CONCEALED'}<br>${phaseText}`;
}

const AIGuardSkeletonConfiguration = {
    headRadius: 0.25,
    torsoWidth: 0.6,
    torsoHeight: 0.8,
    torsoDepth: 0.3,
    limbWidth: 0.15,
    armLength: 0.7,
    legLength: 0.8
};

const GuardMaterialSet = new THREE.MeshStandardMaterial({color: 0x112244, roughness: 0.7});
const GuardSkinMaterialSet = new THREE.MeshStandardMaterial({color: 0xffccaa, roughness: 0.5});

const AIGuardMeshGroup = new THREE.Group();
const GuardTorsoMesh = new THREE.Mesh(GenerateBoxGeometryWithExplicitVerticesAndIndices(AIGuardSkeletonConfiguration.torsoWidth, AIGuardSkeletonConfiguration.torsoHeight, AIGuardSkeletonConfiguration.torsoDepth), GuardMaterialSet);
GuardTorsoMesh.position.y = AIGuardSkeletonConfiguration.legLength + AIGuardSkeletonConfiguration.torsoHeight / 2;
AIGuardMeshGroup.add(GuardTorsoMesh);

const GuardHeadMesh = new THREE.Mesh(GenerateBoxGeometryWithExplicitVerticesAndIndices(AIGuardSkeletonConfiguration.headRadius*2, AIGuardSkeletonConfiguration.headRadius*2, AIGuardSkeletonConfiguration.headRadius*2), GuardSkinMaterialSet);
GuardHeadMesh.position.y = AIGuardSkeletonConfiguration.legLength + AIGuardSkeletonConfiguration.torsoHeight + AIGuardSkeletonConfiguration.headRadius;
AIGuardMeshGroup.add(GuardHeadMesh);

const GuardLeftArmMesh = new THREE.Mesh(GenerateBoxGeometryWithExplicitVerticesAndIndices(AIGuardSkeletonConfiguration.limbWidth, AIGuardSkeletonConfiguration.armLength, AIGuardSkeletonConfiguration.limbWidth), GuardMaterialSet);
GuardLeftArmMesh.position.set(-AIGuardSkeletonConfiguration.torsoWidth/2 - AIGuardSkeletonConfiguration.limbWidth/2, AIGuardSkeletonConfiguration.legLength + AIGuardSkeletonConfiguration.torsoHeight - AIGuardSkeletonConfiguration.armLength/2, 0);
AIGuardMeshGroup.add(GuardLeftArmMesh);

const GuardRightArmMesh = new THREE.Mesh(GenerateBoxGeometryWithExplicitVerticesAndIndices(AIGuardSkeletonConfiguration.limbWidth, AIGuardSkeletonConfiguration.armLength, AIGuardSkeletonConfiguration.limbWidth), GuardMaterialSet);
GuardRightArmMesh.position.set(AIGuardSkeletonConfiguration.torsoWidth/2 + AIGuardSkeletonConfiguration.limbWidth/2, AIGuardSkeletonConfiguration.legLength + AIGuardSkeletonConfiguration.torsoHeight - AIGuardSkeletonConfiguration.armLength/2, 0);
AIGuardMeshGroup.add(GuardRightArmMesh);

const GuardLeftLegMesh = new THREE.Mesh(GenerateBoxGeometryWithExplicitVerticesAndIndices(AIGuardSkeletonConfiguration.limbWidth, AIGuardSkeletonConfiguration.legLength, AIGuardSkeletonConfiguration.limbWidth), GuardMaterialSet);
GuardLeftLegMesh.position.set(-AIGuardSkeletonConfiguration.torsoWidth/4, AIGuardSkeletonConfiguration.legLength/2, 0);
AIGuardMeshGroup.add(GuardLeftLegMesh);

const GuardRightLegMesh = new THREE.Mesh(GenerateBoxGeometryWithExplicitVerticesAndIndices(AIGuardSkeletonConfiguration.limbWidth, AIGuardSkeletonConfiguration.legLength, AIGuardSkeletonConfiguration.limbWidth), GuardMaterialSet);
GuardRightLegMesh.position.set(AIGuardSkeletonConfiguration.torsoWidth/4, AIGuardSkeletonConfiguration.legLength/2, 0);
AIGuardMeshGroup.add(GuardRightLegMesh);

const GuardFlashlightSpot = new THREE.SpotLight(0xffffff, 2.0, 30, Math.PI/6, 0.5, 1);
GuardFlashlightSpot.position.set(0, AIGuardSkeletonConfiguration.legLength + AIGuardSkeletonConfiguration.torsoHeight - 0.2, 0);
GuardFlashlightSpot.target.position.set(0, 0, 1);
AIGuardMeshGroup.add(GuardFlashlightSpot);
AIGuardMeshGroup.add(GuardFlashlightSpot.target);

AIGuardMeshGroup.position.set(20, 4.2, -15);
scene.add(AIGuardMeshGroup);

const AIGuardPatrolSystem = {
    waypoints: [
        new THREE.Vector3(20, 4.2, -15),
        new THREE.Vector3(0, 4.2, -15),
        new THREE.Vector3(-20, 4.2, -15),
        new THREE.Vector3(-20, 4.2, -5),
        new THREE.Vector3(20, 4.2, -5)
    ],
    currentWaypointIndex: 0,
    speed: 2.0,
    state: 'PATROL',
    animTimer: 0.0,
    currentLineOfSightHitPlayer: false,
    
    update: function(deltaTime) {
        this.animTimer += deltaTime * 5.0;
        GuardLeftLegMesh.rotation.x = Math.sin(this.animTimer) * 0.5;
        GuardRightLegMesh.rotation.x = -Math.sin(this.animTimer) * 0.5;
        GuardLeftArmMesh.rotation.x = -Math.sin(this.animTimer) * 0.5;
        GuardRightArmMesh.rotation.x = Math.sin(this.animTimer) * 0.5;

        if (GameMasterState.distractionActive && this.state !== 'INVESTIGATING') {
            this.state = 'INVESTIGATING';
            GameMasterState.distractionActive = false;
        }

        let targetPos;
        if (this.state === 'PATROL') {
            targetPos = this.waypoints[this.currentWaypointIndex];
            if (AIGuardMeshGroup.position.distanceTo(targetPos) < 0.5) {
                this.currentWaypointIndex = (this.currentWaypointIndex + 1) % this.waypoints.length;
            }
        } else if (this.state === 'INVESTIGATING') {
            targetPos = GameMasterState.distractionLocation;
            if (AIGuardMeshGroup.position.distanceTo(targetPos) < 2.0) {
                this.state = 'PATROL'; 
            }
        }

        if (targetPos) {
            const dir = new THREE.Vector3().subVectors(targetPos, AIGuardMeshGroup.position).normalize();
            AIGuardMeshGroup.position.add(dir.multiplyScalar(this.speed * deltaTime));
            
            const lookAtTarget = new THREE.Vector3().copy(AIGuardMeshGroup.position).add(dir);
            AIGuardMeshGroup.lookAt(lookAtTarget);
            GuardFlashlightSpot.target.position.copy(lookAtTarget);
        }

        this.checkLineOfSight();
    },

    checkLineOfSight: function() {
        const dirToPlayer = new THREE.Vector3().subVectors(camera.position, AIGuardMeshGroup.position).normalize();
        const distanceToPlayer = AIGuardMeshGroup.position.distanceTo(camera.position);
        
        const forwardVector = new THREE.Vector3(0, 0, 1);
        forwardVector.applyQuaternion(AIGuardMeshGroup.quaternion);
        
        const angle = forwardVector.angleTo(dirToPlayer);
        
        if (angle < Math.PI / 4 && distanceToPlayer < 25) {
            const raycaster = new THREE.Raycaster(AIGuardMeshGroup.position, dirToPlayer, 0, distanceToPlayer);
            const intersects = raycaster.intersectObjects(EnvironmentMeshGroups.walls.children, true);
            
            if (intersects.length === 0) {
                this.currentLineOfSightHitPlayer = true;
                if (!GameMasterState.playerDetected) {
                    GameMasterState.playerDetected = true;
                    UpdateHUDStateText("DETECTED - GAME OVER");
                    document.getElementById('fade-overlay').style.opacity = 1.0;
                    setTimeout(() => location.reload(), 3000);
                }
            } else {
                this.currentLineOfSightHitPlayer = false;
            }
        } else {
            this.currentLineOfSightHitPlayer = false;
        }
    }
};

const PostProcessingStackBuilder = {
    composer: null,
    init: function() {
        const renderScene = new THREE.RenderPass(scene, camera);
        this.composer = new THREE.EffectComposer(renderer);
        this.composer.addPass(renderScene);

        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        this.composer.addPass(bloomPass);

        const FilmGrainShaderDefinition = {
            uniforms: {
                "tDiffuse": { value: null },
                "time": { value: 0.0 },
                "nIntensity": { value: 0.4 },
                "sIntensity": { value: 0.9 },
                "sCount": { value: 4096 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float time;
                uniform float nIntensity;
                varying vec2 vUv;
                float random(vec2 p) {
                    vec2 K1 = vec2(23.14069263277926, 2.665144142690225);
                    return fract(cos(dot(p,K1)) * 12345.6789);
                }
                void main() {
                    vec4 cTextureScreen = texture2D(tDiffuse, vUv);
                    float dx = random(vUv + time);
                    vec3 cResult = cTextureScreen.rgb + cTextureScreen.rgb * clamp(0.1 + dx, 0.0, 1.0) * nIntensity;
                    // Vignette
                    vec2 distVec = vUv - vec2(0.5);
                    float dist = length(distVec);
                    cResult *= smoothstep(0.8, 0.2, dist * 1.2);
                    gl_FragColor = vec4(cResult, cTextureScreen.a);
                }
            `
        };
        this.filmPass = new THREE.ShaderPass(FilmGrainShaderDefinition);
        this.filmPass.renderToScreen = true;
        this.composer.addPass(this.filmPass);
    },
    render: function(delta) {
        if (this.filmPass) this.filmPass.uniforms["time"].value += delta;
        this.composer.render();
    }
};
PostProcessingStackBuilder.init();

function AdvancedPhysicsCollisionResolutionSystem(proposedPos, boundingBoxes, radius) {
    let finalPos = proposedPos.clone();
    for (let i = 0; i < boundingBoxes.length; i++) {
        const box = boundingBoxes[i];
        
        if (finalPos.x + radius > box.minX && finalPos.x - radius < box.maxX &&
            finalPos.y + radius > box.minY && finalPos.y - radius < box.maxY &&
            finalPos.z + radius > box.minZ && finalPos.z - radius < box.maxZ) {
            
            const overlapX1 = (finalPos.x + radius) - box.minX;
            const overlapX2 = box.maxX - (finalPos.x - radius);
            const overlapY1 = (finalPos.y + radius) - box.minY;
            const overlapY2 = box.maxY - (finalPos.y - radius);
            const overlapZ1 = (finalPos.z + radius) - box.minZ;
            const overlapZ2 = box.maxZ - (finalPos.z - radius);
            
            const minOverlap = Math.min(overlapX1, overlapX2, overlapY1, overlapY2, overlapZ1, overlapZ2);
            
            if (minOverlap === overlapY1) { finalPos.y -= overlapY1; PlayerPhysicalProperties.isGrounded = false; }
            else if (minOverlap === overlapY2) { finalPos.y += overlapY2; PlayerPhysicalProperties.isGrounded = true; PlayerPhysicalProperties.velocity.y = 0; }
            else if (minOverlap === overlapX1) finalPos.x -= overlapX1;
            else if (minOverlap === overlapX2) finalPos.x += overlapX2;
            else if (minOverlap === overlapZ1) finalPos.z -= overlapZ1;
            else if (minOverlap === overlapZ2) finalPos.z += overlapZ2;
        }
    }
    return finalPos;
}

const GlobalClockInstance = new THREE.Clock();

function MainGameRenderLoop() {
    requestAnimationFrame(MainGameRenderLoop);
    const deltaTime = GlobalClockInstance.getDelta();
    const elapsedTime = GlobalClockInstance.getElapsedTime();

    CustomProceduralGrimeMaterialShader.uniforms.time.value = elapsedTime;
    CustomRustySteelMaterialShader.uniforms.time.value = elapsedTime;

    if (ControllerPointerIsLocked && !GameMasterState.playerDetected) {
        const targetHeight = PlayerMovementStateCrouch ? PlayerPhysicalProperties.heightCrouching : PlayerPhysicalProperties.heightStanding;
        PlayerPhysicalProperties.currentHeight += (targetHeight - PlayerPhysicalProperties.currentHeight) * 10 * deltaTime;
        const currentSpeed = PlayerMovementStateCrouch ? PlayerPhysicalProperties.crouchSpeed : PlayerPhysicalProperties.speed;

        PlayerPhysicalProperties.velocity.x -= PlayerPhysicalProperties.velocity.x * 10.0 * deltaTime;
        PlayerPhysicalProperties.velocity.z -= PlayerPhysicalProperties.velocity.z * 10.0 * deltaTime;
        PlayerPhysicalProperties.velocity.y -= 30.0 * deltaTime; 

        PlayerPhysicalProperties.direction.z = Number(PlayerMovementStateForward) - Number(PlayerMovementStateBackward);
        PlayerPhysicalProperties.direction.x = Number(PlayerMovementStateRight) - Number(PlayerMovementStateLeft);
        PlayerPhysicalProperties.direction.normalize();

        if (PlayerMovementStateForward || PlayerMovementStateBackward) PlayerPhysicalProperties.velocity.z -= PlayerPhysicalProperties.direction.z * currentSpeed * deltaTime;
        if (PlayerMovementStateLeft || PlayerMovementStateRight) PlayerPhysicalProperties.velocity.x -= PlayerPhysicalProperties.direction.x * currentSpeed * deltaTime;

        const camRot = CameraEulerRotationSystem.y;
        const moveX = PlayerPhysicalProperties.velocity.x * deltaTime;
        const moveZ = PlayerPhysicalProperties.velocity.z * deltaTime;
        const moveY = PlayerPhysicalProperties.velocity.y * deltaTime;

        const actualMoveX = moveX * Math.cos(camRot) + moveZ * Math.sin(camRot);
        const actualMoveZ = moveZ * Math.cos(camRot) - moveX * Math.sin(camRot);

        let proposedPos = camera.position.clone();
        proposedPos.x -= actualMoveX;
        proposedPos.z -= actualMoveZ;
        proposedPos.y += moveY;

        proposedPos.y -= PlayerPhysicalProperties.currentHeight;
        proposedPos = AdvancedPhysicsCollisionResolutionSystem(proposedPos, PhysicalCollisionWorldBoundingBoxes, PlayerPhysicalProperties.radius);
        proposedPos.y += PlayerPhysicalProperties.currentHeight;
        
        camera.position.copy(proposedPos);
        
        if (PlayerMovementStateForward || PlayerMovementStateBackward || PlayerMovementStateLeft || PlayerMovementStateRight) {
            if (PlayerPhysicalProperties.isGrounded) {
                camera.position.y += Math.sin(elapsedTime * (PlayerMovementStateCrouch ? 8 : 12)) * (PlayerMovementStateCrouch ? 0.02 : 0.05);
            }
        }
    }

    AIGuardPatrolSystem.update(deltaTime);
    
    // Flickering light logic
    if (Math.random() > 0.95) {
        MainCourtyardSpotlight.intensity = 1.0 + Math.random() * 2.0;
    } else {
        MainCourtyardSpotlight.intensity = 2.0;
    }

    const positions = EnvironmentalDustSystem.geometry.attributes.position.array;
    for (let i = 0; i < 30000; i += 3) {
        positions[i+1] -= deltaTime * 2.0;
        if (positions[i+1] < 0) positions[i+1] = 20;
    }
    EnvironmentalDustSystem.geometry.attributes.position.needsUpdate = true;

    PostProcessingStackBuilder.render(deltaTime);
}

window.addEventListener('resize', onWindowResize, false);
function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    PostProcessingStackBuilder.composer.setSize(window.innerWidth, window.innerHeight);
}

MainGameRenderLoop();
</script>
